<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Tulisan - Ruang Sahal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fbfcfb; }
        .serif { font-family: 'Playfair Display', serif; }
        .text-primary { color: #10b981; }
        .bg-primary { background-color: #10b981; }
        #editor { min-height: 400px; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1.5rem; background: white; outline: none; line-height: 1.8; }
        #editor:focus { border-color: #10b981; }
        .toolbar button { padding: 0.5rem; border-radius: 0.375rem; color: #4b5563; min-width: 32px; transition: all 0.2s; }
        .toolbar button:hover { background-color: #f3f4f6; color: #10b981; }
        #access-blocker { position: fixed; inset: 0; background: white; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        /* Modal & Preview Styles */
        #preview-modal { transition: opacity 0.3s ease; }
        #preview-iframe { transition: width 0.3s ease, height 0.3s ease; }
        .device-btn.active { color: #10b981; background-color: #ecfdf5; border-color: #10b981; }
        
        /* Area Tersembunyi untuk Proses Foto Quotes */
        #hidden-canvas-area { position: absolute; left: -9999px; top: -9999px; width: 600px; }
    </style>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXYqecKRQpUTyDzpOU8GgyZETlgQuWKmQ",
            authDomain: "webproject-6d706.firebaseapp.com",
            projectId: "webproject-6d706",
            storageBucket: "webproject-6d706.firebasestorage.app",
            messagingSenderId: "369405151835",
            appId: "1:369405151835:web:b81077b8e794a99ff18d7e"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const blocker = document.getElementById('access-blocker');
            if (user && !user.isAnonymous) { if (blocker) blocker.style.display = 'none'; } 
            else {
                if (blocker) {
                    blocker.innerHTML = `<div class="text-center max-w-sm"><h2 class="serif text-2xl mb-2">Akses Ditolak</h2><p class="text-gray-500 mb-6">Halaman ini hanya untuk Admin.</p><a href="index.html" class="bg-primary text-white px-8 py-3 rounded-full font-bold">Beranda</a></div>`;
                }
            }
        });
    </script>
</head>
<body class="antialiased">

    <div id="hidden-canvas-area"></div>

    <div id="success-modal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl text-center">
            <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="serif text-3xl text-slate-900 mb-2">Berhasil!</h2>
            <p class="text-gray-500 mb-8 text-sm">Tulisan Anda dan gambar pratinjau berhasil disimpan.</p>
            <div class="flex flex-col gap-3">
                <button onclick="window.location.href='admin.html'" class="w-full bg-primary text-white py-3.5 rounded-full font-bold hover:scale-105 transition-all">Tulis Baru Lagi</button>
                <button onclick="window.location.href='dashboard-admin.html'" class="w-full bg-emerald-50 text-emerald-600 py-3.5 rounded-full font-bold hover:bg-emerald-100 transition-all border border-emerald-100">Kembali ke Dashboard</button>
            </div>
        </div>
    </div>

    <div id="preview-modal" class="fixed inset-0 z-[300] hidden bg-slate-900/90 backdrop-blur-md flex-col">
        <div class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="closePreview()" class="text-gray-400 hover:text-red-500 transition-colors p-2 rounded-full hover:bg-red-50">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <span class="font-bold text-slate-700 hidden md:inline">Pratinjau Tulisan</span>
            </div>
            <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200">
                <button id="btn-desktop" onclick="setPreviewMode('desktop')" class="device-btn active px-4 py-1.5 rounded-md text-sm font-semibold transition-all">Laptop</button>
                <button id="btn-mobile" onclick="setPreviewMode('mobile')" class="device-btn px-4 py-1.5 rounded-md text-sm font-semibold transition-all">HP</button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto flex items-center justify-center p-0 md:p-8 bg-slate-900">
            <iframe id="preview-iframe" class="bg-white md:rounded-xl shadow-2xl w-full h-full border-0" src="about:blank"></iframe>
        </div>
    </div>

    <div id="access-blocker"><div class="text-center animate-pulse">Memverifikasi Admin...</div></div>

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="dashboard-admin.html" class="flex items-center gap-2 text-gray-500 hover:text-primary font-bold transition-colors">Dashboard</a>
            <span class="text-xl font-bold text-slate-800">Ruang Sahal Editor</span>
            <div class="w-20"></div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-10"><h1 id="page-title" class="serif text-4xl text-slate-900 mb-2">Mulai Menulis</h1></header>

        <div class="mb-10">
            <div class="flex gap-4 border-b border-gray-200 pb-4">
                <label class="cursor-pointer relative">
                    <input type="radio" name="jenis" value="Artikel" class="peer sr-only" checked>
                    <div class="px-6 py-3 rounded-xl border-2 border-transparent text-gray-400 font-bold peer-checked:bg-emerald-50 peer-checked:text-primary peer-checked:border-emerald-200">✍️ Artikel</div>
                </label>
                <label class="cursor-pointer relative">
                    <input type="radio" name="jenis" value="Quotes" class="peer sr-only">
                    <div class="px-6 py-3 rounded-xl border-2 border-transparent text-gray-400 font-bold peer-checked:bg-emerald-50 peer-checked:text-primary peer-checked:border-emerald-200">💬 Quotes</div>
                </label>
            </div>
        </div>

        <form id="publish-form" class="space-y-8">
            <div id="section-naratif" class="space-y-6 block">
                <div class="grid md:grid-cols-2 gap-6">
                    <input type="text" id="judul" placeholder="Judul Tulisan..." class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary transition-all">
                    <input type="text" id="penulis-naratif" placeholder="Nama Penulis..." value="Sahal" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary transition-all">
                </div>
                <div class="grid md:grid-cols-2 gap-6">
                    <input type="url" id="cover-url" placeholder="URL Gambar Cover (https://...)" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary transition-all">
                    <input type="date" id="tanggal" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary transition-all">
                </div>
                <div class="space-y-2">
                    <div id="live-cover-preview" class="hidden mb-4"><img id="preview-img-src" src="" class="w-full h-48 md:h-64 object-cover rounded-xl border shadow-sm"></div>
                    <div class="toolbar flex gap-1 p-2 bg-gray-50 border border-gray-200 border-b-0 rounded-t-xl">
                        <button type="button" onclick="format('bold')">B</button><button type="button" onclick="format('italic')">I</button>
                    </div>
                    <div id="editor" contenteditable="true" class="bg-white"></div>
                </div>
            </div>

            <div id="section-quotes" class="space-y-6 hidden bg-emerald-50/30 p-6 rounded-2xl border border-emerald-100">
                <div class="grid md:grid-cols-2 gap-6">
                    <input type="date" id="tanggal-quotes" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary transition-all bg-white">
                    <input type="text" id="penulis-quotes" placeholder="Nama Tokoh/Penulis..." class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary transition-all bg-white">
                </div>
                <textarea id="editor-quotes" rows="5" placeholder="Tulis kutipan di sini..." class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-primary transition-all resize-y text-lg leading-relaxed"></textarea>
            </div>

            <div class="pt-8 border-t border-gray-100 flex flex-col md:flex-row gap-4">
                <button type="submit" id="btn-submit" class="flex-1 bg-primary text-white px-12 py-4 rounded-full font-bold shadow-lg hover:bg-emerald-600 transition-all flex justify-center items-center gap-2">
                    <span>Publish Tulisan</span>
                </button>
                <button type="button" onclick="openPreview()" class="md:w-48 bg-white text-emerald-600 border-2 border-emerald-100 px-8 py-4 rounded-full font-bold hover:bg-emerald-50 transition-all">Preview</button>
            </div>
        </form>
    </main>

    <script type="module">
        import { getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const app = getApp();
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');

        window.format = (cmd) => document.execCommand(cmd, false, null);
        const formatTglInput = (dateObj) => { const y = dateObj.getFullYear(); const m = String(dateObj.getMonth() + 1).padStart(2, '0'); const d = String(dateObj.getDate()).padStart(2, '0'); return `${y}-${m}-${d}`; };

        // Handle Radio Buttons
        document.querySelectorAll('input[name="jenis"]').forEach(r => r.addEventListener('change', e => {
            const isArt = e.target.value === 'Artikel';
            document.getElementById('section-naratif').classList.toggle('hidden', !isArt);
            document.getElementById('section-quotes').classList.toggle('hidden', isArt);
        }));

        document.getElementById('tanggal').value = formatTglInput(new Date());
        document.getElementById('tanggal-quotes').value = formatTglInput(new Date());

        // Live Preview Gambar Cover
        document.getElementById('cover-url').addEventListener('input', e => {
            const url = e.target.value; const container = document.getElementById('live-cover-preview');
            if (url.startsWith('http')) { document.getElementById('preview-img-src').src = url; container.classList.remove('hidden'); } else container.classList.add('hidden');
        });

        if (editId) {
            document.getElementById('page-title').innerText = "Edit Tulisan";
            const loadData = async () => {
                const snap = await getDoc(doc(db, 'articles', editId));
                if (snap.exists()) {
                    const data = snap.data(); const isQuotes = data.kategori === 'Quotes';
                    document.querySelector(`input[name="jenis"][value="${isQuotes?'Quotes':'Artikel'}"]`).checked = true;
                    document.querySelector(`input[name="jenis"][value="${isQuotes?'Quotes':'Artikel'}"]`).dispatchEvent(new Event('change'));

                    if (!isQuotes) {
                        document.getElementById('judul').value = data.judul || '';
                        document.getElementById('penulis-naratif').value = data.penulis || 'Sahal';
                        document.getElementById('cover-url').value = data.cover_url || '';
                        document.getElementById('editor').innerHTML = data.isi || '';
                        if (data.tanggal) document.getElementById('tanggal').value = formatTglInput(new Date(data.tanggal.seconds * 1000));
                        if(data.cover_url) document.getElementById('cover-url').dispatchEvent(new Event('input'));
                    } else {
                        document.getElementById('penulis-quotes').value = data.penulis || '';
                        document.getElementById('editor-quotes').value = data.isi || '';
                        if (data.tanggal) document.getElementById('tanggal-quotes').value = formatTglInput(new Date(data.tanggal.seconds * 1000));
                    }
                }
            }; loadData();
        }

        // FUNGSI FOTO QUOTES
        async function captureQuote(isi, penulis, tanggal) {
            const area = document.getElementById('hidden-canvas-area');
            area.innerHTML = `
                <div id="capture-box" style="width: 600px; padding: 60px; background: white; border: 1px solid #eee; border-radius: 40px; text-align: center; font-family: sans-serif; position: relative;">
                    <div style="position: absolute; left: 0; top: 0; bottom: 0; width: 12px; background: #10b981; border-radius: 40px 0 0 40px;"></div>
                    <div style="color: #10b981; font-size: 60px; font-weight: bold;">"</div>
                    <h1 style="font-size: 32px; font-weight: bold; color: #333; line-height: 1.5; margin-bottom: 30px;">${isi}</h1>
                    <p style="color: #999; font-weight: bold; letter-spacing: 1px;">— ${penulis} —</p>
                    <div style="margin-top: 30px;"><span style="background: #f0fdf4; color: #10b981; padding: 10px 20px; border-radius: 99px; font-weight: bold; font-size: 14px;">${tanggal}</span></div>
                </div>
            `;
            const canvas = await html2canvas(document.getElementById('capture-box'), { scale: 2 });
            return canvas.toDataURL("image/jpeg", 0.8);
        }

        document.getElementById('publish-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit'); const btnT = btn.querySelector('span');
            btn.disabled = true; btnT.innerText = "Memproses...";

            const jenis = document.querySelector('input[name="jenis"]:checked').value;
            let payload = { kategori: jenis, updatedAt: Timestamp.now() };

            try {
                if (jenis === 'Artikel') {
                    payload.judul = document.getElementById('judul').value;
                    payload.penulis = document.getElementById('penulis-naratif').value || 'Sahal';
                    payload.cover_url = document.getElementById('cover-url').value || '';
                    payload.isi = document.getElementById('editor').innerHTML;
                    payload.tanggal = Timestamp.fromDate(new Date(document.getElementById('tanggal').value));
                } else {
                    const isiQ = document.getElementById('editor-quotes').value;
                    const penQ = document.getElementById('penulis-quotes').value || 'Tanpa Penulis';
                    const tglVal = document.getElementById('tanggal-quotes').value;
                    const tglLong = new Date(tglVal).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });

                    btnT.innerText = "Memfoto Quotes...";
                    const dataUrl = await captureQuote(isiQ.replace(/\n/g, '<br>'), penQ, tglLong);
                    
                    btnT.innerText = "Mengunggah Gambar...";
                    const storageRef = ref(storage, `previews/${editId || Date.now()}.jpg`);
                    await uploadString(storageRef, dataUrl, 'data_url');
                    payload.og_image_url = await getDownloadURL(storageRef);

                    payload.judul = 'Quote: ' + penQ;
                    payload.penulis = penQ;
                    payload.isi = isiQ;
                    payload.tanggal = Timestamp.fromDate(new Date(tglVal));
                }

                if (editId) { await updateDoc(doc(db, 'articles', editId), payload); } 
                else { payload.createdAt = Timestamp.now(); await addDoc(collection(db, 'articles'), payload); }
                
                document.getElementById('success-modal').classList.remove('hidden');
                document.getElementById('success-modal').classList.add('flex');
            } catch (err) { alert(err.message); btn.disabled = false; btnT.innerText = "Publish"; }
        };

        window.openPreview = () => {
            const j = document.querySelector('input[name="jenis"]:checked').value; const isQ = j === 'Quotes';
            const html = `<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body class="p-8 bg-slate-50"><div class="max-w-2xl mx-auto">${isQ ? `<div class="bg-white p-12 rounded-3xl shadow-xl text-center border-l-[12px] border-emerald-500"><div class="text-6xl text-emerald-500 font-bold">"</div><h1 class="text-2xl font-bold mb-6">${document.getElementById('editor-quotes').value.replace(/\n/g, '<br>')}</h1><p class="font-bold text-gray-400">— ${document.getElementById('penulis-quotes').value} —</p></div>` : `<div class="bg-white p-12 rounded-3xl shadow-sm"><h1 class="text-4xl font-bold mb-8">${document.getElementById('judul').value}</h1>${document.getElementById('editor').innerHTML}</div>`}</div></body></html>`;
            const docPre = document.getElementById('preview-iframe').contentWindow.document; docPre.open(); docPre.write(html); docPre.close();
            document.getElementById('preview-modal').classList.replace('hidden', 'flex');
        };
        window.closePreview = () => document.getElementById('preview-modal').classList.replace('flex', 'hidden');
        window.setPreviewMode = (m) => { const i = document.getElementById('preview-iframe'); i.style.width = m === 'mobile' ? '375px' : '100%'; };
    </script>
</body>
</html>
