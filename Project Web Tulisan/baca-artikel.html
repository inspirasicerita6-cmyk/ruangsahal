<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - Ruang Sahal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #333; }
        .serif { font-family: 'Playfair Display', serif; }
        .text-primary { color: #10b981; } .bg-primary { background-color: #10b981; }
        .prose { line-height: 1.8; font-size: 1.125rem; color: #374151; } .prose p { margin-bottom: 1.5rem; }
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="antialiased bg-slate-50/30 min-h-screen flex flex-col relative">

    <div id="toast-copy" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[100] text-sm font-medium flex items-center gap-2">
        <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Tautan berhasil disalin!
    </div>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <svg class="w-8 h-8 text-primary transition-transform group-hover:scale-110" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path d="M2 21c0-3 1.85-5.36 5.08-6C10 14.52 12 13 13 12"></path></svg>
                <span class="text-2xl font-semibold tracking-tight text-slate-800">Ruang Sahal</span>
            </a>
            <a href="index.html" class="flex items-center gap-2 text-slate-600 font-medium hover:text-primary transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Kembali
            </a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 md:px-8 py-8 md:py-16 flex-1 w-full">
        <div id="loading-skeleton" class="space-y-8 bg-white p-6 md:p-8 rounded-2xl md:rounded-[2rem] border border-gray-100 shadow-sm">
            <div class="h-12 w-full skeleton rounded-xl"></div><div class="h-12 w-2/3 skeleton rounded-xl"></div><div class="h-64 w-full skeleton rounded-xl mt-6"></div>
        </div>

        <article id="article-content" class="hidden w-full">
            <div id="layout-naratif" class="bg-white p-5 md:p-12 rounded-2xl md:rounded-[2rem] border border-gray-100 shadow-sm hidden">
                <header class="mb-10">
                    <h1 id="article-title" class="serif text-3xl md:text-4xl leading-tight text-slate-900 mb-6"></h1>
                    <div class="flex items-center justify-between py-5 border-y border-gray-100">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-primary shrink-0"><svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></div>
                            <div><p id="article-author" class="text-sm font-bold text-slate-800 line-clamp-1"></p><p id="article-date" class="text-xs text-gray-400 font-medium uppercase tracking-wider"></p></div>
                        </div>
                    </div>
                </header>
                <div id="article-body" class="prose max-w-none text-base md:text-lg"></div>
            </div>

            <div id="layout-quotes" class="hidden flex-col items-center">
                <div class="relative bg-white rounded-2xl md:rounded-[2rem] shadow-xl shadow-slate-200/50 mx-auto w-full md:w-fit max-w-2xl overflow-hidden flex flex-col items-center px-5 pt-8 pb-6 md:px-12 md:pt-12 md:pb-10 text-center z-10 border border-slate-100">
                    <div class="absolute left-0 top-0 bottom-0 w-3 md:w-4 bg-primary"></div>
                    <svg class="w-10 h-10 md:w-14 md:h-14 text-emerald-200 mb-6" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" /></svg>
                    <h1 class="text-xl md:text-[28px] font-bold leading-relaxed text-slate-800 font-sans tracking-tight mb-6" id="quote-text"></h1>
                    <p class="text-sm md:text-base font-bold text-gray-400 tracking-wider" id="quote-author"></p>
                </div>
                <div class="mt-8 text-center w-full"><span class="inline-block text-xs md:text-sm text-emerald-600 font-bold uppercase tracking-widest bg-emerald-50 px-5 py-2 rounded-full border border-emerald-100 shadow-sm" id="quote-date-badge"></span></div>
            </div>

            <div class="mt-16 flex flex-col items-center justify-center gap-5">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Bagikan tulisan ini</p>
                <div class="flex items-center gap-4">
                    <button onclick="shareWA()" class="w-12 h-12 flex items-center justify-center rounded-full bg-emerald-50 text-emerald-500 hover:bg-emerald-500 hover:text-white transition-all shadow-sm hover:shadow-lg"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg></button>
                    <button onclick="shareFB()" class="w-12 h-12 flex items-center justify-center rounded-full bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm hover:shadow-lg"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"/></svg></button>
                    <button onclick="shareIG()" class="w-12 h-12 flex items-center justify-center rounded-full bg-pink-50 text-pink-600 hover:bg-gradient-to-tr hover:from-yellow-400 hover:via-pink-500 hover:to-purple-600 hover:text-white transition-all shadow-sm hover:shadow-lg"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5zm4.25 4a6 6 0 1 1 0 12 6 6 0 0 1 0-12zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm5.5-3.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z"/></svg></button>
                </div>
            </div>
            
            <footer class="mt-12 pt-8 border-t border-gray-200/60">
                <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                    <p class="text-gray-400 italic text-sm">"Setiap kata adalah jejak perjalanan makna."</p>
                    <a href="index.html" class="group flex items-center gap-2 text-primary font-bold hover:gap-3 transition-all bg-white px-6 py-3 rounded-full border border-emerald-100 hover:shadow-lg hover:shadow-emerald-50"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg> Kembali ke Beranda</a>
                </div>
            </footer>
        </article>

        <div id="error-state" class="hidden text-center py-20 bg-white rounded-[2rem] border border-gray-100 shadow-sm mt-10">
            <h2 class="serif text-3xl text-slate-800 mb-4">Tulisan tidak ditemukan</h2>
            <a href="index.html" class="inline-block bg-primary text-white px-8 py-3 rounded-full font-bold shadow-lg hover:-translate-y-1 transition-transform">Kembali ke Beranda</a>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-gray-100 mt-auto bg-white">
        <p class="text-gray-400 text-sm">© 2026 Ruang Sahal.</p>
    </footer>

    <script>
        window.shareWA = () => { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(document.title)}%0A%0A${encodeURIComponent(window.location.href)}`, '_blank'); };
        window.shareFB = () => { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank'); };
        window.shareIG = () => { const ta = document.createElement("textarea"); ta.value = window.location.href; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); const toast = document.getElementById('toast-copy'); toast.classList.remove('opacity-0'); setTimeout(() => toast.classList.add('opacity-0'), 3000); } catch (err) { alert("Gagal menyalin tautan."); } document.body.removeChild(ta); };
    </script>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXYqecKRQpUTyDzpOU8GgyZETlgQuWKmQ",
            authDomain: "webproject-6d706.firebaseapp.com",
            projectId: "webproject-6d706",
            storageBucket: "webproject-6d706.firebasestorage.app",
            messagingSenderId: "369405151835",
            appId: "1:369405151835:web:b81077b8e794a99ff18d7e"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        async function fetchArticle() {
            if (!articleId) return document.getElementById('error-state').classList.remove('hidden');

            try {
                if (!auth.currentUser) await signInAnonymously(auth);
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const docSnap = await getDoc(doc(db, 'articles', articleId)); // Mengarah murni ke 'articles'
                        if (docSnap.exists()) displayArticle(docSnap.data());
                        else document.getElementById('error-state').classList.remove('hidden');
                    }
                });
            } catch (err) { document.getElementById('error-state').classList.remove('hidden'); }
        }

        function displayArticle(data) {
            let kategori = data.kategori || 'Artikel'; if (kategori === 'Naratif') kategori = 'Artikel';
            const penulis = data.penulis || data.kategori_manual || 'Tanpa Penulis';
            const dateStr = data.tanggal ? new Date(data.tanggal.seconds * 1000).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' }) : '';

            if (kategori === 'Quotes') {
                document.getElementById('layout-naratif').classList.add('hidden');
                document.getElementById('layout-quotes').classList.remove('hidden');
                document.getElementById('layout-quotes').classList.add('flex');

                document.getElementById('quote-text').innerHTML = (data.isi || '').replace(/\n/g, '<br>');
                document.getElementById('quote-author').innerText = `— ${penulis} —`;
                document.getElementById('quote-date-badge').innerText = dateStr;
                document.title = `Quote: ${penulis} - Ruang Sahal`;
            } else {
                document.getElementById('layout-quotes').classList.add('hidden');
                document.getElementById('layout-quotes').classList.remove('flex');
                document.getElementById('layout-naratif').classList.remove('hidden');

                const judul = data.judul || 'Tanpa Judul';
                document.getElementById('article-title').innerText = judul;
                document.getElementById('article-author').innerText = penulis;
                document.getElementById('article-date').innerText = dateStr;
                
                const coverUrl = data.cover_url;
                const bodyContainer = document.getElementById('article-body');
                if (coverUrl) {
                    const imgTag = `<img src="${coverUrl}" class="w-full h-64 md:h-96 object-cover rounded-2xl md:rounded-3xl mb-8 shadow-sm" alt="Cover">`;
                    bodyContainer.innerHTML = imgTag + (data.isi || '');
                } else {
                    bodyContainer.innerHTML = data.isi || '<p class="italic text-gray-400">Belum ada konten tulisan.</p>';
                }
                
                document.title = `${judul} - Ruang Sahal`;
            }

            document.getElementById('loading-skeleton').classList.add('hidden');
            document.getElementById('article-content').classList.remove('hidden');
        }
        fetchArticle();
    </script>
</body>
</html>
